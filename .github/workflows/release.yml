name: Release

# Triggers:
#  1) push of a version tag like `v0.1.0`  ->  tests + build + GitHub Release
#  2) manual run from the Actions tab (workflow_dispatch)
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

# electron-builder creates the GitHub Release and uploads assets using the
# automatic GITHUB_TOKEN (passed to it as GH_TOKEN below).
permissions:
  contents: write

jobs:
  # --- 1. Tests gate the build -------------------------------------------
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      # Static type-check (tsc --noEmit)
      - run: npm run check

      # Unit tests (vitest run, exits non-zero on failure)
      - run: npm test

  # --- 2. Build per platform + publish to the GitHub Release ------------
  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            script: package:mac
          - os: windows-latest
            script: package:win
          - os: ubuntu-latest
            script: package:linux
    runs-on: ${{ matrix.os }}
    env:
      # electron-builder reads GH_TOKEN to authenticate against the GitHub
      # API. The automatic GITHUB_TOKEN has contents:write (see above), which
      # is enough to create the release and upload assets — no PAT needed.
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      # --- mac only: import & trust the self-signed code-signing cert ----
      # Result on end-user machines: Gatekeeper shows "Apple cannot check it
      # for malicious software" with an "Open Anyway" option (no "damaged").
      # Not notarized — no seamless double-click, but no terminal workaround
      # required from users either.
      - name: Import & trust mac signing identity
        if: matrix.os == 'macos-latest'
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          set -e
          echo "$CSC_LINK" | base64 -d > /tmp/ows.p12
          KC="$RUNNER_TEMP/ows.keychain-db"
          KP=$(openssl rand -hex 16)
          security create-keychain -p "$KP" "$KC"
          security unlock-keychain -p "$KP" "$KC"
          security set-keychain-settings "$KC"
          LIST=$(security list-keychains -d user | tr -d '"')
          security list-keychains -d user -s "$KC" $LIST
          security import /tmp/ows.p12 -k "$KC" -P "$CSC_KEY_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productbuild
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KP" "$KC"
          security find-certificate -c "Open Wiki Studio" -p "$KC" > /tmp/ows.crt
          # Trust the self-signed cert for code signing (passwordless sudo on runners).
          sudo security add-trusted-cert -d -r trustRoot -p codeSign /tmp/ows.crt

      # --- windows only: import & trust the self-signed Authenticode cert -
      # electron-builder reads CSC_LINK/CSC_KEY_PASSWORD on Windows too and
      # signs the NSIS installer + unpacked binaries via signtool. The cert
      # is self-signed, so the signature is valid Authenticode but Windows
      # SmartScreen still warns "Unknown publisher" until reputation builds
      # up (OV/EV certs would fix this, but cost ~100-200 USD/yr).
      - name: Import & trust windows signing certificate
        if: matrix.os == 'windows-latest'
        env:
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $p12 = [Convert]::FromBase64String($env:WIN_CSC_LINK)
          $p12Path = Join-Path $env:RUNNER_TEMP "ows-win.p12"
          [IO.File]::WriteAllBytes($p12Path, $p12)

          $pwd = ConvertTo-SecureString -String $env:WIN_CSC_KEY_PASSWORD -AsPlainText -Force
          # Import into the CurrentUser Personal store so signtool can locate
          # the private key, and into Trusted Root so the self-signed chain
          # builds cleanly on the runner.
          Import-PfxCertificate -FilePath $p12Path `
            -CertStoreLocation Cert:\CurrentUser\My -Password $pwd | Out-Null

          $cert = Get-PfxCertificate -FilePath $p12Path
          $root = New-Object System.Security.Cryptography.X509Certificates.X509Store("Root", "CurrentUser")
          $root.Open("ReadWrite")
          $root.Add($cert)
          $root.Close()

      # Build & publish, split per platform so each job only defines the env
      # vars its signing path needs. CRITICAL: on mac, CSC_LINK / CSC_KEY_PASSWORD
      # must stay UNDEFINED (not empty string) — electron-builder treats `""` as
      # "a link is set" (getCscLink returns "" which is != null), enters its
      # createKeychain path with an empty link, resolves it to the workspace dir
      # and fails with "not a file". With CSC_LINK undefined, getCscLink returns
      # undefined and electron-builder uses the CSC_NAME keychain identity that
      # the "Import & trust mac signing identity" step installed above.
      - name: Build & publish (mac)
        if: matrix.os == 'macos-latest'
        env:
          CSC_NAME: Open Wiki Studio
        run: npm run ${{ matrix.script }}

      - name: Build & publish (windows)
        if: matrix.os == 'windows-latest'
        env:
          # electron-builder drives signtool directly from the p12.
          CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: npm run ${{ matrix.script }}

      - name: Build & publish (linux)
        if: matrix.os == 'ubuntu-latest'
        run: npm run ${{ matrix.script }}